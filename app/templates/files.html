{% extends "base.html" %}

{% block main %}

<h1>Uploaded Images</h1>

<div class="image-grid">
    {% for image in images %}
    <div class="image-item">
        <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}"/>
        <p>{{ image }}</p>
    </div>
    {% endfor %}
</div>

{% endblock %}
